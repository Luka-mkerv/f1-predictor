version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: f1_predictor
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_predictor"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: